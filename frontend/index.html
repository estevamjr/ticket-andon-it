<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndonIT | IT Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <h1 class="logo">Andon<span class="logo-highlight">IT</span></h1>

            <div class="form-section" id="auth-section">
                <h2>🔐 Authentication</h2>
                <input type="text" id="reg-username" placeholder="New user">
                <input type="password" id="reg-password" placeholder="New password">
                <button id="registerUserBtn">1. Register</button>
                <hr class="divider">
                <input type="text" id="login-username" placeholder="Username">
                <input type="password" id="login-password" placeholder="Password">
                <button id="loginBtn">2. Login</button>
            </div>

            <div class="form-section" id="ticket-section" style="display: none;">
                <h2>➕ New Incident</h2>
                <input type="text" id="ticketTitle" placeholder="Title">
                <textarea id="ticketDescription" placeholder="Description"></textarea>
                <select id="ticketPriority">
                    <option value="" disabled selected>Priority</option>
                    <option value="Low">Low</option>
                    <option value="Middle">Middle</option>
                    <option value="High">High</option>
                </select>
                <button id="registerTicketBtn">Create Ticket</button>
            </div>

            <div class="form-section" id="batch-section" style="display: none;">
                <h2>⚙️ AI Batch Telemetry</h2>
                <input type="file" id="jsonFileInput" accept=".json">
                <button id="processBatchBtn">Process Batch</button>
            </div>

            <div id="message" class="message"></div>
        </div>

        <div class="report-container">
            <button id="logoutBtn" class="logout-button" style="display: none;">Logout</button>

            <div class="report-section" id="andon-section" style="display: none; margin-top: 3%;">
                <div class="andon-wrapper">
                    <div id="andon-light" class="andon-light status-off"></div>
                    <div class="andon-info">
                        <h3 id="andon-status-text">System: Offline</h3>
                        <p id="polling-label">Polling: Disabled</p>
                        <button id="polling-btn">Enable Polling</button>
                    </div>
                </div>
            </div>

            <div class="report-section">
                <div class="ticket-board-container">
                    <div class="ticket-column">
                        <h3 class="column-title">Open <span id="count-open">0</span></h3>
                        <div class="ticket-list" id="column-open"></div>
                    </div>
                    <div class="ticket-column">
                        <h3 class="column-title">In Progress <span id="count-inprogress">0</span></h3>
                        <div class="ticket-list" id="column-inprogress"></div>
                    </div>
                    <div class="ticket-column">
                        <h3 class="column-title">Closed <span id="count-closed">0</span></h3>
                        <div class="ticket-list" id="column-closed"></div>
                    </div>
                </div>
            </div>

            <div class="report-section">
                <h2>📜 Activity History (Newest first)</h2>
                <div id="logListContainer"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
